<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Reservas | PistaPádel</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>


<nav class="navbar">
    <a href="index.html" class="nav-logo">Pista<span>Pádel</span></a>
    <div class="nav-links">
        <a href="courts.html">Pistas</a>
        <a href="reservations.html">Mis reservas</a>
        <a href="login.html" class="btn btn-outline">Entrar</a>
    </div>
</nav>

<main class="page">
    <div class="container">

        <div class="page-header">
            <h1>Mis Reservas</h1>
            <p>Consulta, filtra y gestiona tus partidas programadas.</p>
        </div>

        <div class="filter-bar">
            <div class="form-group">
                <label>Desde</label>
                <input type="date" id="filterFrom">
            </div>
            <div class="form-group">
                <label>Hasta</label>
                <input type="date" id="filterTo">
            </div>
            <button class="btn btn-primary" onclick="cargarReservas()">Filtrar Reservas</button>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Pista</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaReservas">
                    </tbody>
                </table>
            </div>

            <div id="emptyState" class="empty-state" style="display:none;">
                <div class="empty-icon">🎾</div>
                <h3>No se han encontrado reservas</h3>
                <p>Prueba con otras fechas o reserva una pista nueva.</p>
                <a href="courts.html" class="btn btn-primary btn-sm" style="margin-top:15px;">Ir a Pistas</a>
            </div>
        </div>

    </div>
</main>

<script>
  const API_BASE = "http://127.0.0.1:8080/pistaPadel";

  async function cargarReservas() {

    const from = document.getElementById("filterFrom").value;
    const to = document.getElementById("filterTo").value;

    let url = API_BASE + "/reservations";

    const params = [];

    if (from) {
      params.push("from=" + from);
    }

    if (to) {
      params.push("to=" + to);
    }

    if (params.length > 0) {
      url += "?" + params.join("&");
    }

    try {
      const resp = await fetch(url, {
        method: "GET",
        credentials: "include"
      });

      if (resp.status === 401) {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
        return;
      }

      if (!resp.ok) {
        alert("No se pudieron cargar las reservas.");
        return;
      }

      const reservas = await resp.json();

      const tbody = document.getElementById("tablaReservas");
      const emptyState = document.getElementById("emptyState");
      const tableWrapper = document.querySelector(".table-wrapper");

      tbody.innerHTML = "";

      if (!reservas || reservas.length === 0) {
        emptyState.style.display = "block";
        tableWrapper.style.display = "none";
        return;
      }

      emptyState.style.display = "none";
      tableWrapper.style.display = "block";

      reservas.forEach(function(res) {
        const estado = res.estado || "ACTIVA";
        const statusClass = estado === "ACTIVA" ? "badge-active" : "badge-cancelled";
        const horaInicio = String(res.horaInicio).substring(0, 5);
        const horaFin = String(res.horaFin).substring(0, 5);

        tbody.innerHTML += `
          <tr>
            <td><strong>${res.fechaReserva}</strong></td>
            <td>${horaInicio} - ${horaFin}</td>
            <td>Pista ${res.idPista}</td>
            <td><span class="badge ${statusClass}">${estado}</span></td>
            <td>
              ${estado === "ACTIVA" ? `
                <button class="btn btn-small btn-outline" onclick="editar('${res.idReserva}')">Editar</button>
                <button class="btn btn-small btn-danger" onclick="cancelar('${res.idReserva}')">Cancelar</button>
              ` : `<span class="muted">Sin acciones</span>`}
            </td>
          </tr>
        `;
      });

    } catch (err) {
      console.error("Error al cargar reservas:", err);
      alert("No se puede conectar con el servidor.");
    }
  }

  async function editar(id) {
    const nuevaHora = prompt("Introduce la nueva hora de inicio (ej: 18:00):");

    if (!nuevaHora) {
      return;
    }

    const body = {
      horaInicio: nuevaHora,
      duracionMinutos: 60
    };

    try {
      const resp = await fetch(API_BASE + "/reservations/" + id, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify(body)
      });

      if (resp.status === 401) {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
        return;
      }

      if (resp.ok) {
        alert("Reserva actualizada");
        cargarReservas();
      } else if (resp.status === 409) {
        alert("Ese horario está ocupado o la reserva no se puede modificar.");
      } else {
        alert("Error al editar la reserva.");
      }

    } catch (err) {
      console.error(err);
      alert("No se puede conectar con el servidor.");
    }
  }

  async function cancelar(id) {
    if (!confirm("¿Seguro que quieres cancelar esta partida?")) {
      return;
    }

    try {
      const resp = await fetch(API_BASE + "/reservations/" + id, {
        method: "DELETE",
        credentials: "include"
      });

      if (resp.status === 401) {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
        return;
      }

      if (resp.ok || resp.status === 204) {
        cargarReservas();
      } else if (resp.status === 409) {
        alert("La reserva ya estaba cancelada.");
      } else {
        alert("No se pudo cancelar la reserva.");
      }

    } catch (err) {
      console.error(err);
      alert("No se puede conectar con el servidor.");
    }
  }

  cargarReservas();
</script>
</body>
</html>
